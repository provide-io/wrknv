name: Test Setup Action

on:
  pull_request:
    paths:
      - '.github/actions/setup-wrkenv/**'
      - '.github/workflows/test-setup-action.yml'
  workflow_dispatch:

jobs:
  test-setup-pypi:
    name: Test Setup from PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup wrkenv from PyPI
        uses: ./.github/actions/setup-wrkenv
        with:
          python-version: '3.11'
          install-from: 'pypi'
          version: 'latest'
      
      - name: Verify installation
        run: |
          wrkenv --version
          wrkenv --help
          wrkenv status

  test-setup-local:
    name: Test Setup from Local
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup wrkenv from local
        uses: ./.github/actions/setup-wrkenv
        with:
          python-version: ${{ matrix.python }}
          install-from: 'local'
      
      - name: Test with tools
        run: |
          wrkenv --version
          wrkenv setup --check
          wrkenv config path

  test-setup-with-config:
    name: Test Setup with Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create test configuration
        run: |
          cat > test-wrkenv.toml << EOF
          project_name = "test-project"
          version = "1.0.0"
          
          [tools]
          tofu = { version = "1.8.0" }
          EOF
      
      - name: Setup wrkenv with config
        uses: ./.github/actions/setup-wrkenv
        with:
          install-from: 'local'
          config-file: 'test-wrkenv.toml'
          tofu-version: '1.8.0'
      
      - name: Verify tools
        run: |
          wrkenv status
          which tofu || echo "tofu not found"

  test-setup-with-profile:
    name: Test Setup with Profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup wrkenv
        uses: ./.github/actions/setup-wrkenv
        with:
          install-from: 'local'
      
      - name: Create and load profile
        run: |
          # Create a test profile
          wrkenv profile save test-profile --force || true
          wrkenv profile list
          
          # Test loading (even if it doesn't have tools)
          wrkenv profile load test-profile || true