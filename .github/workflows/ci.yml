name: ⚙️ Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.5.14"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Check code formatting
        run: |
          source .venv/bin/activate
          ruff format --check src/ tests/

      - name: Lint code
        run: |
          source .venv/bin/activate
          ruff check src/ tests/

      - name: Type check
        run: |
          source .venv/bin/activate
          mypy src/ --ignore-missing-imports

  test:
    name: Test py${{ matrix.python-version }} on ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson((github.actor == 'nektos/act') && '{"include":[{"runner":"ubuntu-24.04","platform":"linux_amd64","python-version":"3.11"}]}' || '{"include":[{"runner":"ubuntu-24.04","platform":"linux_amd64","python-version":"3.11"},{"runner":"ubuntu-24.04","platform":"linux_amd64","python-version":"3.12"},{"runner":"ubuntu-24.04","platform":"linux_amd64","python-version":"3.13"},{"runner":"ubuntu-24.04-arm","platform":"linux_arm64","python-version":"3.11"},{"runner":"ubuntu-24.04-arm","platform":"linux_arm64","python-version":"3.12"},{"runner":"ubuntu-24.04-arm","platform":"linux_arm64","python-version":"3.13"},{"runner":"macos-15","platform":"darwin_arm64","python-version":"3.11"},{"runner":"macos-15","platform":"darwin_arm64","python-version":"3.12"},{"runner":"macos-15","platform":"darwin_arm64","python-version":"3.13"},{"runner":"macos-15-intel","platform":"darwin_amd64","python-version":"3.11"},{"runner":"macos-15-intel","platform":"darwin_amd64","python-version":"3.12"},{"runner":"macos-15-intel","platform":"darwin_amd64","python-version":"3.13"},{"runner":"windows-2022","platform":"windows_amd64","python-version":"3.11"},{"runner":"windows-2022","platform":"windows_amd64","python-version":"3.12"},{"runner":"windows-2022","platform":"windows_amd64","python-version":"3.13"}]}') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
      
      - name: Create virtual environment
        run: uv venv
      
      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          source .venv/bin/activate
          uv pip install -e ".[dev]"
      
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv\Scripts\activate
          uv pip install -e ".[dev]"
      
      - name: Run tests with coverage (Unix)
        if: runner.os != 'Windows'
        run: |
          source .venv/bin/activate
          pytest tests/ -v --cov=src/wrknv --cov-report=xml --cov-report=term-missing

      - name: Run tests with coverage (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv\Scripts\activate
          pytest tests/ -v --cov=src/wrknv --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11' && matrix.platform == 'linux_amd64' && github.actor != 'nektos/act' && env.ACT != 'true'
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Test CLI commands
        run: |
          uv run wrknv --help
          uv run wrknv config path
          uv run wrknv setup --check

      - name: Test config initialization
        run: |
          source .venv/bin/activate
          cd /tmp
          echo -e "test-project\n1.0.0\nINFO\nn\nn\nn\nn\n" | wrknv config init
          cat .wrknv.toml
      
      - name: Test profile operations
        run: |
          uv run wrknv profile list
          uv run wrknv profile save test-profile --force || true

  build:
    name: Build Distribution
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Build wheel and sdist
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          uv build
      
      - name: Check distributions
        run: |
          ls -la dist/
          python -m pip install twine
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  build-psp:
    name: Build PSP (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson((github.actor == 'nektos/act') && '{"include":[{"os":"ubuntu-24.04","target":"linux_amd64"}]}' || '{"include":[{"os":"ubuntu-24.04","target":"linux_amd64"},{"os":"ubuntu-24.04-arm","target":"linux_arm64"},{"os":"macos-15-intel","target":"darwin_amd64"},{"os":"macos-15","target":"darwin_arm64"},{"os":"windows-2022","target":"windows_amd64"}]}') }}
    steps:
      - uses: actions/checkout@v4

      - uses: provide-io/ci-tooling/actions/build-psp@main
        with:
          manifest: pyproject.toml
          output-path: dist/wrknv_${{ matrix.target }}.psp
          strip: true

      # Smoke-test the PSP: run the built binary with --help to confirm it executes
      - name: Smoke-test PSP (non-Windows)
        if: ${{ !startsWith(matrix.os, 'windows') }}
        shell: bash
        run: |
          chmod +x dist/wrknv_${{ matrix.target }}.psp
          ./dist/wrknv_${{ matrix.target }}.psp --help

      # Windows PSP launchers are PE binaries; rename to .exe and run via cmd to
      # preserve SYSTEMROOT/WINDIR/COMSPEC which the PSP runtime requires
      - name: Smoke-test PSP (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        shell: cmd
        run: |
          copy dist\wrknv_${{ matrix.target }}.psp dist\wrknv_${{ matrix.target }}.exe
          dist\wrknv_${{ matrix.target }}.exe --help

      - uses: actions/upload-artifact@v7
        with:
          name: psp-${{ matrix.target }}
          path: dist/*.psp
