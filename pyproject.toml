[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wrknv"
version = "0.1.0"
description = "🧰🌍 Work Environment - Foundation for the provide.io ecosystem"
authors = [
    {name = "Provide.io", email = "engineering@provide.io"},
]
readme = "README.md"
license = {text = "MIT"}
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Build Tools",
    "Topic :: System :: Installation/Setup",
]
requires-python = ">=3.11"
dependencies = [
    "click>=8.0",
    "packaging>=23.0",
    "semver>=3.0.0",
    "tomli-w>=1.0.0",
    "rich>=13.0.0",
    "jinja2>=3.0.0",
    "attrs>=23.0.0",
    "cattrs>=23.0.0",
    "pyvider-telemetry>=0.0.15",
]

[project.optional-dependencies]
package = [
    # "flavor",  # Install with: uv pip install -e ~/code/gh/provide-io/flavor
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
    "bandit>=1.7.0",
]

[project.scripts]
wrknv = "wrknv.wenv.cli:entry_point"

[project.urls]
"Homepage" = "https://github.com/provide-io/wrknv"
"Bug Tracker" = "https://github.com/provide-io/wrknv/issues"
"Documentation" = "https://github.com/provide-io/wrknv#readme"
"Source Code" = "https://github.com/provide-io/wrknv"

[tool.setuptools]
packages = [
    "wrknv", 
    "wrknv.wenv", 
    "wrknv.wenv.managers", 
    "wrknv.wenv.operations", 
    "wrknv.package"
]
package-dir = {"" = "src"}

[tool.setuptools.package-data]
wrknv = ["py.typed"]

[tool.black]
line-length = 88
target-version = ['py311', 'py312', 'py313']
include = '\.pyi?$'

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle
    "F",    # pyflakes
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "I",    # isort
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "cli: CLI command tests",
    "config: Configuration tests",
    "container: Container management tests",
    "package: Package management tests",
    "operations: File and platform operations tests",
    "managers: Tool manager tests",
    "slow: Slow running tests",
    "network: Tests requiring network access",
]

[tool.coverage.run]
source = ["src/wrknv"]
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if __name__ == .__main__.:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if False:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[dependency-groups]
dev = [
    "pytest>=8.4.1",
    "pytest-asyncio>=1.1.0",
    "pytest-benchmark>=5.1.0",
    "pytest-cov>=6.2.1",
    "pytest-xdist>=3.8.0",
]
